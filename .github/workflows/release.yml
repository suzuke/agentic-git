name: release

# Publishes the workspace to crates.io. Runs GitHub-side so it uses the real
# crates-io registry and reads the token from a repo secret — nothing local.
#
# One-time setup (operator): add a `CARGO_REGISTRY_TOKEN` repo secret
# (Settings → Secrets and variables → Actions), value = a crates.io API token.
#
# Triggers:
#   - `release: published`   → auto-publish whatever version is tagged.
#   - `workflow_dispatch`    → manual run (use this to publish the EXISTING
#                              v0.1.0: Actions → release → Run workflow, pick
#                              the `v0.1.0` tag as the ref).
#
# Note: `cargo publish` is idempotent-hostile — re-running for an already-
# published version fails on "crate already uploaded". That is expected; bump
# the workspace version for the next release before re-running.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # A release-triggered run publishes the exact tagged commit; a manual
          # run uses whatever ref was dispatched.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      # Never publish a version that doesn't build + pass tests.
      - run: cargo test --workspace

      # The contract crate MUST publish first: `agentic-git` depends on
      # `agentic-git-core`, and cargo verifies that dependency resolves from
      # crates.io, so core must already be indexed there.
      - name: publish agentic-git-core
        run: cargo publish -p agentic-git-core

      # cargo (>=1.66) waits for its own index entry, but the dependent publish
      # can still race registry propagation — retry to ride out indexing lag.
      - name: publish agentic-git
        run: |
          for i in 1 2 3 4 5; do
            if cargo publish -p agentic-git; then
              exit 0
            fi
            echo "::notice::agentic-git-core not yet resolvable from crates.io — retry $i/5 in 30s"
            sleep 30
          done
          echo "::error::agentic-git publish failed after 5 retries" >&2
          exit 1
